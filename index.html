<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ═══ Primary Meta ════════════════════════════════════════════════════ -->
    <title>Brainrot Labs | Meme, Gadget Inutili e Arredamento Cringe</title>
    <meta name="description" content="Brainrot Labs: il negozio definitivo per meme, gadget inutili e arredamento cringe. Customizza con AI, stampa su richiesta, piangi dopo. Spedizione in tutta Italia." />
    <meta name="keywords" content="meme merchandise, gadget inutili, t-shirt meme, arredamento cringe, brainrot, personalizza meme, print on demand italia" />
    <meta name="author" content="Brainrot Labs" />
    <meta name="robots" content="index, follow, max-image-preview:large" />
    <link rel="canonical" href="https://brainrotlabs.com" />

    <!-- ═══ Open Graph (Facebook, WhatsApp, LinkedIn) ═══════════════════════ -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Brainrot Labs" />
    <meta property="og:title" content="Brainrot Labs | Meme, Gadget Inutili e Arredamento Cringe" />
    <meta property="og:description" content="Customizza i tuoi meme preferiti su t-shirt, tazze e poster con AI generativa. Spedizione in Italia. Compra ora, piangi dopo." />
    <meta property="og:url" content="https://brainrotlabs.com" />
    <meta property="og:image" content="https://brainrotlabs.com/og-image.jpg" />
    <meta property="og:image:alt" content="Brainrot Labs — Meme Merchandise Store" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:locale" content="it_IT" />

    <!-- ═══ Twitter Card ═════════════════════════════════════════════════════ -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@brainrotlabs" />
    <meta name="twitter:creator" content="@brainrotlabs" />
    <meta name="twitter:title" content="Brainrot Labs | Meme Merchandise con AI" />
    <meta name="twitter:description" content="Customizza i tuoi meme preferiti su t-shirt, tazze e poster. AI generativa + print on demand. 🧠💀" />
    <meta name="twitter:image" content="https://brainrotlabs.com/og-image.jpg" />
    <meta name="twitter:image:alt" content="Brainrot Labs — Meme Merchandise Store" />

    <!-- ═══ PWA & Mobile ══════════════════════════════════════════════════════ -->
    <meta name="theme-color" content="#000000" />
    <meta name="color-scheme" content="light" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Brainrot" />
    <link rel="manifest" href="/manifest.json" />

    <!-- ═══ Icons & Favicons ══════════════════════════════════════════════════ -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />

    <!-- ═══ Preconnect (performance) ═════════════════════════════════════════ -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="dns-prefetch" href="https://images.unsplash.com" />
    <link rel="dns-prefetch" href="https://firestore.googleapis.com" />
    <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com" />

    <!-- ═══ Structured Data — Organization ═══════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Brainrot Labs",
      "url": "https://brainrotlabs.com",
      "logo": "https://brainrotlabs.com/og-image.jpg",
      "description": "E-commerce di merchandise a tema meme con AI generativa, customizer 3D e community.",
      "sameAs": [],
      "contactPoint": {
        "@type": "ContactPoint",
        "contactType": "customer service",
        "availableLanguage": "Italian"
      }
    }
    </script>

    <!-- ═══ Structured Data — WebSite (Sitelinks Search) ════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Brainrot Labs",
      "url": "https://brainrotlabs.com",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://brainrotlabs.com/?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- ═══ Structured Data — Store ══════════════════════════════════════════ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Store",
      "name": "Brainrot Labs",
      "url": "https://brainrotlabs.com",
      "description": "Il negozio definitivo per meme merchandise, gadget inutili e arredamento cringe.",
      "image": "https://brainrotlabs.com/og-image.jpg",
      "priceRange": "€12 - €50",
      "currenciesAccepted": "EUR",
      "paymentAccepted": "Credit Card",
      "areaServed": {
        "@type": "Country",
        "name": "Italy"
      },
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Meme Merchandise",
        "itemListElement": [
          { "@type": "OfferCatalog", "name": "T-Shirt Meme" },
          { "@type": "OfferCatalog", "name": "Tazze Meme" },
          { "@type": "OfferCatalog", "name": "Poster Meme" },
          { "@type": "OfferCatalog", "name": "Cover Telefono Meme" },
          { "@type": "OfferCatalog", "name": "Gadget Inutili" }
        ]
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
