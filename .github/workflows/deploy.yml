name: Deploy to Firebase

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Type check
        run: npx tsc --noEmit

      - name: Build frontend
        run: npx vite build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_FIRESTORE_DB_ID: ${{ secrets.VITE_FIREBASE_FIRESTORE_DB_ID }}

      - name: Install functions dependencies
        run: npm ci --prefix functions --legacy-peer-deps

      - name: Build Cloud Functions
        run: npm run build --prefix functions

      - name: Write functions env file
        run: |
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> functions/.env
          echo "PRINTFUL_API_KEY=${{ secrets.PRINTFUL_API_KEY }}" >> functions/.env
          echo "APP_URL=${{ secrets.APP_URL }}" >> functions/.env

      - name: Deploy to Firebase
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: gen-lang-client-0894248501
          channelId: live

      - name: Deploy Cloud Functions
        run: npx firebase-tools deploy --only functions --project gen-lang-client-0894248501
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
